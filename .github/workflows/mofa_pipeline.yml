name: MOFA Daily Letter Pipeline

on:
  workflow_dispatch:

  schedule:
    - cron: "17 */3 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: read

concurrency:
  group: mofa-daily-letter-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Google authentication files
        shell: bash
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
          TOKEN_GOOGLE_JSON: ${{ secrets.TOKEN_GOOGLE_JSON }}
        run: |
          printf '%s' "$CREDENTIALS_JSON" > credentials.json
          printf '%s' "$TOKEN_GOOGLE_JSON" > token_google.json

          python - <<'PY'
          import json

          for filename in ("credentials.json", "token_google.json"):
              with open(filename, "r", encoding="utf-8") as f:
                  json.load(f)

          print("Google 인증 JSON 파일 복원 및 형식 검증 완료")
          PY

      - name: Run MOFA pipeline
        run: python pipeline.py
